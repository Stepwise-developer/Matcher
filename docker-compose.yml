services:
  nginx:
    container_name: omatcha_nginx
    build:
      context: .
      dockerfile: docker/dockerfile.nginx
    ports:
      - "443:443"
    volumes:
      - ./workspace/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - react
      - rust

  react:
    container_name: omatcha_react
    build:
      context: .
      dockerfile: docker/dockerfile.react
    volumes:
      - ./workspace/react:/workspace
      - react_node_modules:/workspace/node_modules
      - react_next:/workspace/.next
    working_dir: /workspace
    command: sh -c "npm install && npm run dev"

  rust:
    container_name: omatcha_rust
    build:
      context: .
      dockerfile: docker/dockerfile.rust
    volumes:
      - ./workspace/rust:/workspace
    working_dir: /workspace
    command: cargo run

volumes:
  react_node_modules:
  react_next:
