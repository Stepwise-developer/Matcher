services:
  matcher:
    container_name: matcher
    image: matcher:latest
    build:
      context: docker
      dockerfile: dockerfile
      args:
        - http_tmp=$http_proxy
        - https_tmp=$https_proxy
    env_file:
      - .env
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command: tail -f /dev/null

